name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC sweep for advisories on the dev deps.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # CodeQL on the JavaScript surface (docs/assets/js + docs/api).
  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # Block PRs that introduce vulnerable or restrictively licensed deps.
  # Requires Dependency Graph to be enabled on the repo (Settings →
  # Security & analysis). Marked continue-on-error so the absence of
  # the feature doesn't block merges — npm-audit and CodeQL still gate.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Quick npm audit on prod deps. The site has zero runtime npm deps,
  # so this primarily guards the test harness.
  npm-audit:
    name: npm audit (devDependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false
